version: 2.1

jobs:
  test:
    machine:
      image: default
    steps:
      - checkout
      - run: curl -fsSL https://deno.land/x/install@v0.1.9/install.sh?source | sh
      - run: /home/circleci/.deno/bin/deno upgrade --version 1.41.3
      - run:
          name: Run lint
          command: /home/circleci/.deno/bin/deno task lint
      - run:
          name: Run fmt
          command: /home/circleci/.deno/bin/deno task fmt --check

      - run: curl -fsSL https://deb.nodesource.com/setup_21.x | sudo -E bash - && sudo apt-get install -y nodejs
      - run: npm install -g supabase@2.101.0
      - run:
          name: Setup Supabase
          command: supabase start
      - run:
          name: Start Functions Server
          command: /home/circleci/.deno/bin/deno task test:setup
          background: true
      - run:
          name: Wait for services
          command: sleep 30
      - run:
          name: Run tests
          command: /home/circleci/.deno/bin/deno task test
      - run:
          name: Run DB tests
          command: supabase db test
      - run:
          name: Clean up after test
          command: supabase stop
          when: always

workflows:
  test:
    jobs:
      - test
